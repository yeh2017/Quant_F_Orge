name: Publish release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must use semantic version format, for example 1.0.1"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        env:
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            source_ref="$TAG"
          else
            source_ref="$GITHUB_SHA"
          fi
          git archive \
            --format=zip \
            --prefix=QFO-Quant-Platform/ \
            --output=QFO-Quant-Platform.zip \
            "$source_ref"
          sha256sum QFO-Quant-Platform.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              QFO-Quant-Platform.zip \
              SHA256SUMS.txt \
              --clobber
            exit 0
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "QFO量化回测平台 $VERSION" \
            --generate-notes \
            QFO-Quant-Platform.zip \
            SHA256SUMS.txt
